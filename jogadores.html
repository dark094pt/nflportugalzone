function renderPlayers(){
  const TEAM_COLORS={
    kc:'#E31837',bal:'#241773',buf:'#00338D',phi:'#004C54',cin:'#FB4F14',
    mia:'#008E97',det:'#0076B6',min:'#4F2683',sf:'#AA0000',dal:'#003594',
    lar:'#003594',lv:'#A5ACAF',cle:'#FF3C00',pit:'#FFB612',gb:'#203731',
    nyj:'#125740',den:'#FB4F14',ari:'#97233F',atl:'#A71930',car:'#0085CA',
    chi:'#0B162A',hou:'#03202F',ind:'#002C5F',jax:'#006778',lac:'#0080C6',
    ne:'#002244',no:'#D3BC8D',nyg:'#0B2265',sea:'#002244',tb:'#D50A0A',
    ten:'#0C2340',wsh:'#773141',gb2:'#203731'
  };
  const filtered=PLAYERS.filter(p=>currentPos==='all'||p.pos===currentPos||
    (currentPos==='DL'&&['DL','DE','DT','NT'].includes(p.pos))||
    (currentPos==='DB'&&['DB','CB','S','SS','FS'].includes(p.pos))||
    (currentPos==='OL'&&['OL','OT','OG','C'].includes(p.pos))||
    (currentPos==='LB'&&['LB','ILB','OLB','MLB'].includes(p.pos))
  );
  const grid=document.getElementById('players-grid');
  grid.innerHTML=filtered.map((p,i)=>{
    const statKeys=Object.keys(p.stats).slice(0,4);
    const tc=TEAM_COLORS[p.abbr]||'#1a2540';
    const tcAlpha=tc+'18';
    return`<div class="player-card reveal" style="position:relative;">
      <div class="player-card-img" style="background:linear-gradient(160deg,${tcAlpha},#080c14);">
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;overflow:hidden;">
          <span style="font-family:'Bebas Neue',sans-serif;font-size:6.5rem;color:${tc};opacity:0.18;line-height:1;user-select:none;">${p.num}</span>
        </div>
        <img src="${PLAYER_AVATARS[p.id]||''}"
          alt="${p.name}" style="position:relative;z-index:1;height:190px;width:100%;object-fit:cover;object-position:top center;"
          onload="if(this.src&&this.src.startsWith('data:')){const espn='https://a.espncdn.com/combiner/i?img=/i/headshots/nfl/players/full/${p.id}.png&w=350&h=254';const t=new Image();t.onload=()=>{this.src=t.src};t.src=espn;}"
          onerror="const av=PLAYER_AVATARS['${p.id}'];if(av&&!this.src.startsWith('data:'))this.src=av;">
        <div class="player-rank" style="position:absolute;top:0.5rem;left:0.5rem;background:var(--red);color:#fff;font-family:var(--font-display);font-size:1rem;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;z-index:2;">${i+1}</div>
      </div>
      <div class="player-card-body">
        <div class="player-card-pos">${p.pos}</div>
        <div class="player-card-name">${p.name}</div>
        <div class="player-card-team">
          <img src="https://a.espncdn.com/combiner/i?img=/i/teamlogos/nfl/500/${p.abbr}.png&w=40&h=40"
            alt="" style="width:16px;height:16px;object-fit:contain;display:inline-block;vertical-align:middle;margin-right:0.3rem;" onerror="this.style.display='none'">
          ${p.team}
        </div>
        <div class="player-stats-mini">
          ${statKeys.map(k=>`<div class="player-stat-mini"><div class="val">${p.stats[k]}</div>
<div class="lbl">${k}</div></div>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
  initScrollReveal();
}
document.querySelectorAll('.pos-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.pos-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentPos=btn.dataset.pos;
    renderPlayers();
  });
});

renderPlayers();
</script>
</body>
</html>
