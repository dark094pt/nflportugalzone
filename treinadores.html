<style>
.coach-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:var(--transition);display:flex;flex-direction:column}
.coach-card:hover{border-color:var(--border-accent);transform:translateY(-4px);box-shadow:var(--shadow-glow)}
.coach-img{height:220px;background:linear-gradient(135deg,var(--bg-secondary),var(--bg-card));display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.coach-img img{width:100%;height:100%;object-fit:cover;object-position:top}
.coach-team-badge{position:absolute;bottom:0.5rem;right:0.5rem;background:var(--bg-glass);backdrop-filter:blur(8px);border-radius:8px;padding:0.3rem;border:1px solid var(--border)}
.coach-team-badge img{width:36px;height:36px;object-fit:contain}
.coach-body{padding:1.3rem;flex:1}
.coach-name{font-family:var(--font-heading);font-size:1.2rem;font-weight:800;color:var(--text-primary);margin-bottom:0.2rem}
.coach-team{font-size:0.85rem;color:var(--text-secondary);margin-bottom:0.8rem;display:flex;align-items:center;gap:0.4rem}
.coach-record{font-family:var(--font-heading);font-size:0.9rem;font-weight:700;color:var(--red);margin-bottom:0.5rem}
.coach-bio{font-size:0.82rem;color:var(--text-secondary);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.coach-awards{display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.8rem}
</style>

const COACHES=[
  {id:3,name:"Andy Reid",team:"Kansas City Chiefs",abbr:"kc",record:"276-117",since:"2013",bio:"Considerado um dos maiores treinadores da história da NFL. Com 4 Super Bowls conquistados pelos Chiefs (LVII, LVIII e potencialmente mais), Reid é um mestre do ataque e da gestão de plantel. A sua carreira inclui também anos nos Eagles.",awards:["4x Super Bowl","Hall of Fame"]},
  {id:4,name:"John Harbaugh",team:"Baltimore Ravens",abbr:"bal",record:"169-101",since:"2008",bio:"Um dos treinadores mais longevos e bem-sucedidos da era moderna. Conquistou o Super Bowl XLVII em 2013 e é conhecido pela sua gestão emocional da equipa e pela valorização de talentos ofensivos como Lamar Jackson.",awards:["1x Super Bowl","Coach do Ano"]},
  {id:2506119,name:"Kyle Shanahan",team:"San Francisco 49ers",abbr:"sf",record:"70-55",since:"2017",bio:"Filho do lendário Mike Shanahan, Kyle é um dos ofensores mais criativos da liga. O seu sistema de correr a bola é copiado por toda a liga. Chegou ao Super Bowl em 2020 e 2024.",awards:["2x Conf. Champ"]},
  {id:2510344,name:"Dan Campbell",team:"Detroit Lions",abbr:"det",record:"32-19",since:"2021",bio:"Transformou os Lions de uma das equipas mais fracas da liga numa das mais emocionantes. Conhecido pelas suas declarações motivadoras sobre 'morder joelhos', criou uma cultura vencedora em Detroit.",awards:["Coach do Ano 2023"]},
  {id:2512875,name:"Sean McDermott",team:"Buffalo Bills",abbr:"buf",record:"80-55",since:"2017",bio:"Construiu os Bills como um dos concorrentes mais consistentes da AFC. Com Josh Allen, chegou a várias Conference Championships e é reconhecido pela sua defesa agressiva.",awards:["3x AFC East"]},
  {id:3049657,name:"Nick Sirianni",team:"Philadelphia Eagles",abbr:"phi",record:"48-31",since:"2021",bio:"Levou os Eagles ao Super Bowl LVII em apenas o segundo ano. É conhecido pela sua intensidade e pela forma como potencia as capacidades de Jalen Hurts. Conquistou o Super Bowl LIX.",awards:["1x Super Bowl"]},
  {id:2578,name:"Mike Tomlin",team:"Pittsburgh Steelers",abbr:"pit",record:"177-102",since:"2007",bio:"Nunca teve uma temporada com registo negativo em 17+ anos na NFL, uma das marcas mais impressionantes da história do desporto profissional americano. Ganhou o Super Bowl XLIII.",awards:["1x Super Bowl","Coach do Ano"]},
  {id:3052587,name:"Zac Taylor",team:"Cincinnati Bengals",abbr:"cin",record:"38-41",since:"2019",bio:"Transformou os Bengals de perennial perdedores em candidatos ao Super Bowl. Com Joe Burrow, chegaram ao Super Bowl LVI em 2022, quase conquistando o título. Construiu um dos ataques mais letais da liga.",awards:["1x AFC Champion"]},
  {id:3052696,name:"Sean McVay",team:"Los Angeles Rams",abbr:"lar",record:"79-48",since:"2017",bio:"O mais jovem head coach a vencer o Super Bowl na história da NFL (36 anos). O seu sistema ofensivo inspirou uma geração de coordenadores. Conquistou o Super Bowl LVI em 2022.",awards:["1x Super Bowl","2x Coach do Ano"]},
  {id:3054220,name:"Kevin O'Connell",team:"Minnesota Vikings",abbr:"min",record:"26-24",since:"2022",bio:"Antigo discípulo de McVay, revitalizou o ataque dos Vikings. Em 2024, guiou Sam Darnold a uma das melhores temporadas de QB da liga, levando os Vikings a 14 vitórias.",awards:["Coach do Ano 2025/26"]},
  {id:3052906,name:"DeMeco Ryans",team:"Houston Texans",abbr:"hou",record:"20-15",since:"2023",bio:"Antigo coordenador defensivo dos 49ers, construiu uma das defesas mais sofisticadas da AFC. Com C.J. Stroud no ataque, os Texans surgiram como uma das equipas mais promissoras.",awards:["Divisional Title 2023"]},
  {id:3058482,name:"Mike McDaniel",team:"Miami Dolphins",abbr:"mia",record:"23-20",since:"2022",bio:"Coordenador ofensivo inovador que transformou os Dolphins num dos ataques mais rápidos da liga. O seu sistema explora ao máximo a velocidade de Tyreek Hill e os pés de Tua Tagovailoa.",awards:["Divisional Title 2022"]},
  {id:3055688,name:"Brandon Staley",team:"Los Angeles Chargers",abbr:"lac",record:"25-25",since:"2021",bio:"Treinador defensivo inovador que tenta maximizar o talento de Justin Herbert. O seu estilo arrojado de coaching, incluindo decisões de 4ª tentativa, é controverso mas reflete uma mentalidade moderna.",awards:[]},
  {id:3056165,name:"Robert Saleh",team:"New York Jets",abbr:"nyj",record:"20-36",since:"2021",bio:"Ex-coordenador defensivo dos 49ers, está a tentar reconstruir os Jets com Aaron Rodgers. Conhecido pela sua energia e pela filosofia defensiva baseada no sistema de Shanahan.",awards:[]},
];

const TC2={kc:'#E31837',bal:'#241773',buf:'#00338D',phi:'#004C54',cin:'#FB4F14',
    mia:'#008E97',det:'#0076B6',min:'#4F2683',sf:'#AA0000',dal:'#003594',
    lar:'#003594',lv:'#A5ACAF',cle:'#FF3C00',pit:'#FFB612',gb:'#203731',
    nyj:'#125740',den:'#FB4F14',ari:'#97233F',hou:'#03202F',buf2:'#00338D',
    lac:'#0080C6',ne:'#002244'};
document.getElementById('coaches-grid').innerHTML=COACHES.map((c,i)=>{
  const tc=TC2[c.abbr]||'#1a2540';
  const tcA=tc+'18';
  const ini=c.name.split(' ').filter(w=>w.length>0).map(w=>w[0]).join('').slice(0,2).toUpperCase();
  return`
  <div class="coach-card reveal">
    <div class="coach-img" style="background:linear-gradient(160deg,${tcA},#080c14);">
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;">
        <span style="font-family:'Bebas Neue',sans-serif;font-size:4rem;color:${tc};opacity:0.2;letter-spacing:0.05em;">${ini}</span>
      </div>
      <img src="${COACH_AVATARS[c.id]||COACH_AVATARS[String(c.id)]||''}"
        alt="${c.name}" style="position:relative;z-index:1;width:100%;height:100%;object-fit:cover;object-position:top center;"
        onload="if(this.src&&this.src.startsWith('data:')){const espn='https://a.espncdn.com/combiner/i?img=/i/headshots/nfl/coaches/full/${c.id}.png&w=350&h=254';const t=new Image();t.onload=()=>{this.src=t.src};t.src=espn;}"
        onerror="const av=COACH_AVATARS[String(${c.id})];if(av&&!this.src.startsWith('data:'))this.src=av;">
      <div class="coach-team-badge">
        <img src="https://a.espncdn.com/combiner/i?img=/i/teamlogos/nfl/500/${c.abbr}.png&w=80&h=80"
          alt="${c.team}" onerror="this.style.display='none'">
      </div>
    </div>
    <div class="coach-body">
      <div class="coach-name">${c.name}</div>
      <div class="coach-team">
        <img src="https://a.espncdn.com/combiner/i?img=/i/teamlogos/nfl/500/${c.abbr}.png&w=40&h=40"
          alt="" style="width:16px;height:16px;object-fit:contain;" onerror="this.style.display='none'">
        ${c.team}
      </div>
      <div class="coach-record">Registo: ${c.record} · Desde ${c.since}</div>
      <div class="coach-bio">${c.bio}</div>
      ${c.awards.length?`<div class="coach-awards">${c.awards.map(a=>`<span class="badge badge-gold">🏆 ${a}</span>`).join('')}</div>`:''}
    </div>
  </div>`;
}).join('');
initScrollReveal();
</script>
